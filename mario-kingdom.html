<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breesy's Kingdom — Mario Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e17;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            padding: 10px;
            image-rendering: pixelated;
        }

        .mario-box {
            max-width: 880px;
            width: 100%;
            position: relative;
            background: #5c94fc;
            border: 4px solid #000;
            box-shadow: 0 0 0 4px #c04040, 0 8px 0 #000;
            overflow: hidden;
        }

        /* ===== SKY ===== */
        .sky {
            height: 180px;
            background: linear-gradient(180deg, #5c94fc 0%, #7cacfc 60%, #6ca4e0 100%);
            position: relative;
            overflow: hidden;
        }

        /* Mario clouds */
        .cloud-mario {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .cloud-mario .c-row { display: flex; }
        .cloud-mario .c {
            width: 14px; height: 14px;
            background: #fff;
            border: 2px solid #ddd;
        }
        .cloud-mario .c.c2 { width: 18px; }
        .cloud-mario .c.t { width: 10px; }
        .cloud1 { top: 20px; left: 40px; animation: cloudSway 6s ease-in-out infinite; }
        .cloud2 { top: 50px; right: 60px; animation: cloudSway 8s ease-in-out infinite; animation-delay: 2s; }
        @keyframes cloudSway { 0%,100% { transform: translateX(0); } 50% { transform: translateX(15px); } }

        /* Mario hills */
        .hill {
            position: absolute;
            bottom: 0;
            width: 100px;
            height: 50px;
            background: #4a8c3f;
            border-radius: 50% 50% 0 0;
            border: 3px solid #2a6c1f;
            box-shadow: inset -20px 10px rgba(0,0,0,0.1);
        }
        .hill.h1 { left: 10%; }
        .hill.h2 { right: 15%; width: 130px; height: 65px; }
        .hill.h3 { left: 45%; width: 80px; height: 40px; }

        /* Mario bushes */
        .bush {
            position: absolute;
            bottom: 0;
            width: 60px;
            height: 24px;
            background: #3a8c2a;
            border-radius: 50%;
            border: 2px solid #2a6c1f;
        }
        .bush.b1 { left: 25%; }
        .bush.b2 { right: 30%; width: 80px; height: 30px; }

        /* ===== SUN ===== */
        .mario-sun {
            position: absolute;
            top: 15px;
            right: 40px;
            width: 50px;
            height: 50px;
            background: #f5c842;
            border-radius: 50%;
            border: 3px solid #e0a830;
            box-shadow: 0 0 0 4px #f5d872, 0 0 0 8px rgba(245,200,66,0.3);
        }

        /* ===== GROUND ===== */
        .ground-area {
            background: #8c6c3c;
            padding: 0;
            position: relative;
        }
        .ground-row {
            display: flex;
            flex-wrap: wrap;
        }
        .ground-tile {
            width: 32px;
            height: 32px;
            background: #8c6c3c;
            border-bottom: 3px solid #6b4f2a;
            border-right: 1px solid #7a5c32;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #9a7a4a;
        }
        .ground-tile.dark {
            background: #7a5c32;
            border-bottom: 3px solid #5a3c1a;
        }

        /* ===== MARIO PIPE ===== */
        .pipe {
            position: absolute;
            bottom: 32px;
        }
        .pipe.p1 { left: 15%; }
        .pipe.p2 { right: 20%; }
        .pipe-top {
            width: 48px;
            height: 16px;
            background: #3ac85c;
            border: 3px solid #2a9a3a;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            margin: 0 auto;
        }
        .pipe-body {
            width: 36px;
            height: 40px;
            background: #3ac85c;
            border: 3px solid #2a9a3a;
            border-top: none;
            margin: 0 auto;
        }
        .pipe-body .highlight {
            width: 8px;
            height: 100%;
            background: rgba(255,255,255,0.15);
            margin-left: 4px;
        }

        /* ===== QUESTION BLOCKS ===== */
        .q-block {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #f5c842;
            border: 3px solid #c9a020;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #c9a020;
            animation: qBlock 1s ease-in-out infinite;
            box-shadow: 0 4px 0 #b08020;
        }
        @keyframes qBlock {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .q-block.q1 { top: 40px; left: 35%; }
        .q-block.q2 { top: 40px; right: 35%; }
        .q-block.q3 { top: 0px; left: 50%; transform: translateX(-50%); }

        /* ===== BRICK BLOCKS ===== */
        .brick-block {
            position: absolute;
            width: 32px;
            height: 32px;
            background: #c07830;
            border: 3px solid #8c5018;
            box-shadow: inset 0 0 0 4px #a86020;
        }
        .brick-block.br1 { top: 40px; left: 25%; }
        .brick-block.br2 { top: 40px; right: 25%; }
        .brick-block.br3 { top: 0; left: 30%; }
        .brick-block.br4 { top: 0; right: 30%; }

        /* ===== CASTLE (Mario style) ===== */
        .mario-castle {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }
        .castle-flag {
            font-size: 18px;
            animation: flagWave 0.5s step-end infinite;
            margin-bottom: -4px;
        }
        @keyframes flagWave {
            0%,100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
        .castle-top {
            width: 60px;
            height: 20px;
            background: #8a8aa0;
            border: 3px solid #6a6a80;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 4px;
        }
        .castle-top .t {
            width: 12px;
            height: 10px;
            background: #8a8aa0;
            border-top: 3px solid #6a6a80;
        }
        .castle-mid {
            width: 80px;
            height: 40px;
            background: #9a9ab0;
            border: 3px solid #6a6a80;
            border-top: none;
            position: relative;
        }
        .castle-mid .window {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 22px;
            background: #3a3a50;
            border: 3px solid #6a6a80;
            border-radius: 10px 10px 0 0;
        }
        .castle-mid .window::after {
            content: '+';
            color: #6a6a80;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        .castle-base {
            width: 100px;
            height: 24px;
            background: #8a8aa0;
            border: 3px solid #6a6a80;
            border-top: none;
        }
        .castle-base .door {
            width: 20px;
            height: 18px;
            background: #3a2a0a;
            border-radius: 8px 8px 0 0;
            margin: 6px auto 0;
            border: 2px solid #2a1a0a;
        }

        /* ===== CHARACTERS (Mario-style sprites) ===== */
        .mario-char {
            position: absolute;
            bottom: 35px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: charIdle 2s ease-in-out infinite;
        }
        @keyframes charIdle {
            0%,100% { bottom: 35px; }
            50% { bottom: 38px; }
        }

        /* Mario-style body builder */
        .m-sprite {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .m-sprite .r { display: flex; }
        .m-sprite .p { width: 8px; height: 8px; flex-shrink: 0; }

        /* Designer in Mario style - Red/Luigi colors */
        .sprite-designer .p { background: transparent; }
        .sprite-designer .p.h { background: #f5a842; }
        .sprite-designer .p.e { background: #fff; }
        .sprite-designer .p.r { background: #f37021; } /* red shirt */
        .sprite-designer .p.b { background: #2563eb; } /* blue overalls */
        .sprite-designer .p.d { background: #c0561a; } /* shoes */
        .sprite-designer .p.s { background: #f5c842; } /* skin/hair */

        /* Web Dev in Mario style - Blue/Luigi but blue */
        .sprite-webdev .p { background: transparent; }
        .sprite-webdev .p.h { background: #93c5fd; }
        .sprite-webdev .p.e { background: #fff; }
        .sprite-webdev .p.r { background: #2563eb; }
        .sprite-webdev .p.b { background: #1a3a6a; }
        .sprite-webdev .p.d { background: #0f1a3a; }
        .sprite-webdev .p.s { background: #60a5fa; }

        /* Owner in Mario style - Gold/Mario colors */
        .sprite-lead .p { background: transparent; }
        .sprite-lead .p.h { background: #f5d872; }
        .sprite-lead .p.e { background: #fff; }
        .sprite-lead .p.r { background: #f5c842; }
        .sprite-lead .p.b { background: #e0a830; }
        .sprite-lead .p.d { background: #b08020; }
        .sprite-lead .p.s { background: #f5a842; }
        .sprite-lead .p.c { background: #f37021; } /* hat/crown */

        /* Breesy in Mario style - Yoshi/Dog */
        .sprite-breesy .p { background: transparent; }
        .sprite-breesy .p.h { background: #d4a76a; }
        .sprite-breesy .p.e { background: #1a1a2e; }
        .sprite-breesy .p.n { background: #1a1a2e; }
        .sprite-breesy .p.b { background: #c49a5a; }
        .sprite-breesy .p.o { background: #a0793a; }
        .sprite-breesy .p.d { background: #806030; }
        .sprite-breesy .p.s { background: #4a8a3f; } /* Yoshi green spot */

        /* Price tag / label */
        .mario-label {
            font-size: 6px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            margin-top: 4px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
        }
        .mario-label .lv { color: #f5c842; font-size: 5px; }

        /* Speech bubble - Mario style */
        .mario-speech {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 3px 8px;
            font-size: 5px;
            white-space: nowrap;
            border: 3px solid #000;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 20;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
        }
        .mario-speech::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid #fff;
        }
        .mario-char:hover .mario-speech { opacity: 1; }

        /* Character positions */
        .char-designer { left: 8%; }
        .char-webdev { right: 8%; }
        .char-lead { left: 38%; bottom: 42px; z-index: 12; }
        .char-lead .mario-label { color: #f5c842; }
        .char-breesy { left: 28%; bottom: 33px; z-index: 8; }

        /* ===== COIN COUNTER ===== */
        .coin-panel {
            background: #000;
            border: 3px solid #c04040;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .coin-panel .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 8px;
            color: #fff;
        }
        .coin-panel .stat .icon { font-size: 12px; }
        .coin-panel .stat .val { color: #f5c842; font-size: 10px; }

        /* ===== MARIO WORLD TEXT ===== */
        .world-text {
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 7px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            z-index: 20;
        }
        .world-text .big { font-size: 10px; }

        /* ===== COINS floating ===== */
        .coin-float {
            position: absolute;
            font-size: 14px;
            animation: coinSpin 1s ease-in-out infinite;
        }
        @keyframes coinSpin {
            0%,100% { transform: scaleY(1); }
            50% { transform: scaleY(0.3); }
        }

        /* ===== GREEN PIPE LABELS ===== */
        .pipe-label {
            position: absolute;
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 5px;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            white-space: nowrap;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .sky { height: 140px; }
            .mario-char { transform: scale(0.8); }
            .char-designer { left: 3%; }
            .char-webdev { right: 3%; }
            .char-lead { left: 35%; }
            .char-breesy { left: 25%; }
            .mario-castle { transform: translateX(-50%) scale(0.8); bottom: 26px; }
            .hill.h1, .hill.h2, .hill.h3 { display: none; }
        }
    </style>
</head>
<body>
<div class="mario-box">
    <!-- Top Section: Sky -->
    <div class="sky">
        <div class="world-text">
            <div class="big">🏝️ BREESY'S ISLAND</div>
            <div>WORLD 1-1</div>
        </div>
        
        <div class="mario-sun"></div>
        
        <div class="cloud-mario cloud1">
            <div class="c-row"><div class="c t"></div><div class="c c2"></div><div class="c t"></div></div>
            <div class="c-row"><div class="c c2"></div><div class="c"></div><div class="c c2"></div></div>
        </div>
        <div class="cloud-mario cloud2">
            <div class="c-row"><div class="c t"></div><div class="c c2"></div><div class="c t"></div></div>
            <div class="c-row"><div class="c c2"></div><div class="c"></div><div class="c c2"></div></div>
        </div>

        <!-- Question blocks -->
        <div class="q-block q1">❓</div>
        <div class="q-block q2">❓</div>
        <div class="q-block q3">❓</div>
        
        <!-- Brick blocks -->
        <div class="brick-block br1"></div>
        <div class="brick-block br2"></div>
        <div class="brick-block br3"></div>
        <div class="brick-block br4"></div>

        <!-- Hills -->
        <div class="hill h1"></div>
        <div class="hill h2"></div>
        <div class="hill h3"></div>
        
        <!-- Bushes -->
        <div class="bush b1"></div>
        <div class="bush b2"></div>

        <!-- Floating coins -->
        <span class="coin-float" style="top:55px;left:28%;animation-delay:0s;">🪙</span>
        <span class="coin-float" style="top:55px;right:28%;animation-delay:0.5s;">🪙</span>
        <span class="coin-float" style="top:15px;left:50%;animation-delay:1s;">🪙</span>
    </div>

    <!-- Ground Level -->
    <div class="ground-area" style="height: 240px; position: relative;">
        <!-- Ground tiles -->
        <div class="ground-row" style="position: absolute; bottom: 0; width: 100%;">
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
            <div class="ground-tile dark"></div><div class="ground-tile"></div>
        </div>

        <!-- Pipes -->
        <div class="pipe p1">
            <div class="pipe-top"></div>
            <div class="pipe-body"><div class="highlight"></div></div>
        </div>
        <div class="pipe p2">
            <div class="pipe-top"></div>
            <div class="pipe-body"><div class="highlight"></div></div>
        </div>

        <!-- Mario Castle -->
        <div class="mario-castle">
            <div class="castle-flag">🚩</div>
            <div class="castle-top"><div class="t"></div><div class="t"></div><div class="t"></div></div>
            <div class="castle-mid"><div class="window"></div></div>
            <div class="castle-base"><div class="door"></div></div>
        </div>

        <!-- Characters -->
        <!-- Designer -->
        <div class="mario-char char-designer">
            <div class="mario-speech">🎨 Creating!</div>
            <div class="m-sprite sprite-designer">
                <div class="r"><div class="p"></div><div class="p h"></div><div class="p h"></div><div class="p"></div></div>
                <div class="r"><div class="p s"></div><div class="p e"></div><div class="p e"></div><div class="p s"></div></div>
                <div class="r"><div class="p r"></div><div class="p r"></div><div class="p r"></div><div class="p r"></div></div>
                <div class="r"><div class="p b"></div><div class="p b"></div><div class="p b"></div><div class="p b"></div></div>
                <div class="r"><div class="p"></div><div class="p d"></div><div class="p d"></div><div class="p"></div></div>
            </div>
            <div class="mario-label">🎨 DESIGNER <span class="lv">LV.12</span></div>
        </div>

        <!-- Web Dev -->
        <div class="mario-char char-webdev">
            <div class="mario-speech">💻 Standing by...</div>
            <div class="m-sprite sprite-webdev">
                <div class="r"><div class="p"></div><div class="p h"></div><div class="p h"></div><div class="p"></div></div>
                <div class="r"><div class="p s"></div><div class="p e"></div><div class="p e"></div><div class="p s"></div></div>
                <div class="r"><div class="p r"></div><div class="p r"></div><div class="p r"></div><div class="p r"></div></div>
                <div class="r"><div class="p b"></div><div class="p b"></div><div class="p b"></div><div class="p b"></div></div>
                <div class="r"><div class="p"></div><div class="p d"></div><div class="p d"></div><div class="p"></div></div>
            </div>
            <div class="mario-label">💻 WEB DEV <span class="lv">LV.8</span></div>
        </div>

        <!-- Owner/Lead (in front of castle) -->
        <div class="mario-char char-lead">
            <div class="mario-speech">👑 Directing!</div>
            <div class="m-sprite sprite-lead">
                <div class="r"><div class="p"></div><div class="p c"></div><div class="p c"></div><div class="p"></div></div>
                <div class="r"><div class="p s"></div><div class="p e"></div><div class="p e"></div><div class="p s"></div></div>
                <div class="r"><div class="p r"></div><div class="p r"></div><div class="p r"></div><div class="p r"></div></div>
                <div class="r"><div class="p b"></div><div class="p b"></div><div class="p b"></div><div class="p b"></div></div>
                <div class="r"><div class="p"></div><div class="p d"></div><div class="p d"></div><div class="p"></div></div>
            </div>
            <div class="mario-label">👑 OWNER <span class="lv">LV.99</span></div>
        </div>

        <!-- Breesy (Mario Yoshi-style) -->
        <div class="mario-char char-breesy">
            <div class="mario-speech">Woof! Stay Salty!</div>
            <div class="m-sprite sprite-breesy">
                <div class="r"><div class="p"></div><div class="p h"></div><div class="p h"></div><div class="p"></div></div>
                <div class="r"><div class="p h"></div><div class="p e"></div><div class="p e"></div><div class="p h"></div></div>
                <div class="r"><div class="p b"></div><div class="p n"></div><div class="p b"></div><div class="p b"></div></div>
                <div class="r"><div class="p"></div><div class="p s"></div><div class="p o"></div><div class="p"></div></div>
                <div class="r"><div class="p"></div><div class="p d"></div><div class="p d"></div><div class="p"></div></div>
            </div>
            <div class="mario-label">🐕 BREESY <span class="lv">STAY SALTY</span></div>
        </div>
    </div>

    <!-- Coin Panel -->
    <div class="coin-panel">
        <div class="stat"><span class="icon">🪙</span> <span class="val">12</span> QUESTS</div>
        <div class="stat"><span class="icon">🎨</span> <span class="val">104</span> DESIGNS</div>
        <div class="stat"><span class="icon">👕</span> <span class="val">30+</span> PRODUCTS</div>
        <div class="stat"><span class="icon">⭐</span> <span class="val">🐕</span> BREESY</div>
    </div>

    <!-- URL bar -->
    <div style="background:#000;border-top:3px solid #c04040;padding:6px 12px;display:flex;justify-content:space-between;font-size:6px;color:#888;">
